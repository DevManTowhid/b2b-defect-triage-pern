version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus_admin
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: nexus_triage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - nexus-network

  server:
    build:
      context: ./server
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://nexus_admin:securepassword@db:5432/nexus_triage?schema=public
      - CLIENT_URL=http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - nexus-network
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules

  client:
    build:
      context: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
    networks:
      - nexus-network
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules

networks:
  nexus-network:
    driver: bridge

volumes:
  pgdata: